---
name: 'Scribe - Stage, Commit & Push'
description: 'Stage files, commit, and push with optional GPG signing.'
author: 'goeselt'

branding:
  icon: feather
  color: blue

inputs:
  files:
    description: 'Newline-separated list of files or directories to stage.'
    required: true
  message:
    description: 'Commit message.'
    required: true
  git-user-name:
    description: 'Git author name. Defaults to github-actions[bot].'
    required: false
    default: 'github-actions[bot]'
  git-user-email:
    description: 'Git author email. Defaults to the github-actions[bot] noreply address.'
    required: false
    default: '41898282+github-actions[bot]@users.noreply.github.com'
  signing-key:
    description: 'Base64-encoded GPG signing key. When omitted, commits are unsigned.'
    required: false
    default: ''
  force:
    description: 'Pass --force to git add. Required for gitignored paths such as dist/.'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token used for git push and to create or update the PR comment on pull_request events.'
    required: false
    default: ${{ github.token }}
  pr-comment:
    description: 'Whether to create or update the explanatory PR comment on pull_request events.'
    required: false
    default: 'true'
  skip-ci:
    description: 'Whether to append [skip ci] to the created commit message when absent.'
    required: false
    default: 'true'

outputs:
  committed:
    description: "'true' if a commit was created, 'false' if there were no staged changes."
  sha:
    description: 'SHA of the new commit. Empty when committed is false.'

runs:
  using: node24
  main: src/index.js
