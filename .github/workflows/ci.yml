---
name: CI

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Tests
        run: npm test

      - name: Pedant
        id: pedant
        continue-on-error: true
        uses: goeselt/pedant@74965deb38735f0b01dcddce2f6e790feabdfcd9 # v1.4.0
        with:
          summary-github-step: true

      - name: Publish Pedant Report
        if: always()
        uses: goeselt/remark@c2de02a492be4f6f11cd258c86e273a77186c86b # v1.0.5
        with:
          body: ${{ steps.pedant.outputs.summary }}
          comment-key: pedant
          skip-unchanged: true

      - name: Fail On Pedant Findings
        if: steps.pedant.outcome != 'success'
        run: exit 1
