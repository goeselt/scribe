---
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Validate Intent
        uses: goeselt/intent@f6d867043c166cdbe5c9be0ee2fbee84f2065415 # v1.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-comment: true

      # The `edited` trigger fires on PR title/body changes (needed to re-validate intent) but touches no code,
      # so skip everything else in that case.
      - name: Checkout
        if: github.event.action != 'edited'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Tests
        if: github.event.action != 'edited'
        run: npm test

      - name: Pedant
        if: github.event.action != 'edited'
        uses: goeselt/pedant@af85dee4cca8870ce618955da1a5de22d948d40d # v1.1.1
