---
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Validate Intent
        uses: goeselt/intent@21b70d0a25a0aae8002ca2c7fb4f4b3ba604922e # v1.1.2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-comment: true

      # The `edited` trigger fires on PR title/body changes (needed to re-validate intent) but touches no code,
      # so skip everything else in that case.
      - name: Checkout
        if: github.event.action != 'edited'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Tests
        if: github.event.action != 'edited'
        run: npm test

      - name: Pedant
        if: github.event.action != 'edited'
        uses: goeselt/pedant@052c9c1cec0436f4dacb44e4579bbff562d57b1f # v1.2.0
