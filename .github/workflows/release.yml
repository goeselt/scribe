---
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read # Least-privilege default

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # Required to push the release commit and tag.
      id-token: write # Required to create a SLSA attestation for the release.
      attestations: write # Required to create a SLSA attestation for the release.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history needed to find the previous release tag

      - id: intent
        name: Intent Release
        uses: goeselt/intent@0ab5bbaa2e12d54e405da9e9664ac3328f2c274a # v1.2.3
        with:
          initial-version: '1.0.0'

      - name: Bump Version
        if: steps.intent.outputs.release-needed == 'true'
        env:
          VERSION: ${{ steps.intent.outputs.next-version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Commit Version
        if: steps.intent.outputs.release-needed == 'true'
        uses: ./
        with:
          files: package.json
          message: 'chore: bump ${{ steps.intent.outputs.release-tag }}'
          github-token: ${{ secrets.CONTENT_WRITE_PAT }}
          git-user-name: ${{ secrets.RELEASE_SIGNING_USER }}
          git-user-email: ${{ secrets.RELEASE_SIGNING_EMAIL }}
          signing-key: ${{ secrets.RELEASE_SIGNING_KEY }}

      - name: Release
        if: steps.intent.outputs.release-needed == 'true'
        uses: goeselt/dispatch@72482f5dee11ae6ad32d44b9d926c6d1708dea98 # v1.3.6
        with:
          release-tag: ${{ steps.intent.outputs.release-tag }}
          major-tag: ${{ steps.intent.outputs.major-tag }}
          minor-tag: ${{ steps.intent.outputs.minor-tag }}
          git-user-name: ${{ secrets.RELEASE_SIGNING_USER }}
          git-user-email: ${{ secrets.RELEASE_SIGNING_EMAIL }}
          signing-key: ${{ secrets.RELEASE_SIGNING_KEY }}
